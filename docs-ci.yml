name: Docs CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Re-run weekly to catch external links that have rotted since the last commit.
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write  # required for lychee's "create issue on failure" mode

concurrency:
  group: docs-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  link-check:
    name: 🔗 Check internal & external links
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Restore lychee link-check cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: lychee-${{ github.sha }}
          restore-keys: lychee-

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # Skip mailto:, allow private localhost in code examples, follow internal links.
          # Failures are reported in the job summary; the step fails on real broken links only.
          args: >-
            --cache
            --max-cache-age 7d
            --no-progress
            --exclude-mail
            --exclude "^https?://(localhost|127\\.)"
            --exclude "^https?://etherscan\\.io/address/0x000"
            --accept 200,206,429
            './**/*.md'
          fail: true

  markdown-lint:
    name: 📝 Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            !node_modules
        # We don't fail the build on style nits — surface them in the job summary instead.
        continue-on-error: true

  spell-check:
    name: 🔤 Spell check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run typos
        uses: crate-ci/typos@master
        with:
          # Project glossary contains terms typos doesn't know (Roar, $HOOK, Solady, ERC-721A...).
          # See .github/typos.toml for the allow-list.
          config: ./.github/typos.toml
